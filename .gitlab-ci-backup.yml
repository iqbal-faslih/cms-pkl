stages:
  - build
  - deploy

variables:
  REGISTRY_URL: registry.dev.hummatech.com
  IMAGE_NAME: $REGISTRY_URL/$CI_PROJECT_PATH
  TAG: latest
  APP_NAME: cms-pkl-hummatech
  DOCKER_TLS_CERTDIR: ""

build:
  stage: build
  image: docker:20.10.16
  services:
    - docker:dind
  script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $REGISTRY_URL
    - docker build -t $IMAGE_NAME:$TAG .
    - docker push $IMAGE_NAME:$TAG

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p 2289 -H 202.73.26.148 >> ~/.ssh/known_hosts
    - echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
  script:
    - |
      ssh -p 2289 root@202.73.26.148 "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $REGISTRY_URL &&
        docker stop $APP_NAME || true &&
        docker rm $APP_NAME || true &&
        docker pull $IMAGE_NAME:$TAG &&
        docker run -d --name $APP_NAME \
          -p 3001:80 \
          -e VITE_API_URL=$VITE_API_URL \
          -e VITE_API_URL_FILE=$VITE_API_URL_FILE \
          $IMAGE_NAME:$TAG
      "
  only:
    - main